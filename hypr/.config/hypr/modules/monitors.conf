################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# Monitor configuration
# Laptop screen (eDP-2): 1920x1080 at position 0,0 (left side)
monitor=eDP-2,1920x1080@144,0x0,1

# External monitor (HDMI-A-1): 1440x900 at position 1920,0 (right side)
monitor=HDMI-A-1,1440x900@59.89,1920x0,1

# Fallback for any other monitors
monitor=,preferred,auto,1
