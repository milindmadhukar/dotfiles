##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = match:class ^(ghostty)$, float on

# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland - suppress focus for these windows
windowrule {
    name = xwayland-drag-fix
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    suppress_event = focus
}

# Remove the weird pop-up behavior in VSCode
windowrule {
    name = codium-stay-focused
    match:class = ^(codium)$
    stay_focused = on
    min_size = 1 1
}

# Remove the right-click menu blurring in Chromium browsers (keep this AFTER other rules)
# Note: This broad rule will disable blur for most windows. Comment it out if you want blur.
# windowrule = match:class ^(.*)$, no_blur on

# Make file picker windows floating
windowrule {
    name = file-picker-float
    match:title = ^(Open File|Open|Save|Save As|Export|Import|Choose File|Rename)
    float = on
    center = on
}

windowrule {
    name = xdg-portal-float
    match:class = (xdg-desktop-portal-gtk|xdg-desktop-portal-hyprland|Xdg-desktop-portal-gtk|Xdg-desktop-portal-hyprland)
    float = on
    center = on
}

windowrule = match:class (Xdg-desktop-portal-gtk), decorate off

# Disable borders for swaync
windowrule = match:class (swaync), decorate off

# Make browsers opaque
#windowrule = match:class (zen|librewolf|firefox|brave), opacity 1.0 override

layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

layerrule {
    name = vicinae-no-animation
    no_anim = on
    match:namespace = vicinae
}
